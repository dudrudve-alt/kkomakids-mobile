<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <!-- 모바일 viewport: pinch-zoom 막고 viewport-fit로 노치 영역 사용 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <!-- iOS Safari: 홈 스크린 추가 시 풀스크린 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="꼬마키즈" />
  <meta name="theme-color" content="#fef3c7" />
  <!-- 텍스트 선택/길게 누르기 컨텍스트 메뉴 비활성 -->
  <meta name="mobile-web-app-capable" content="yes" />
  <title>꼬마키즈</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 상단 바 -->
  <header class="topbar">
    <button id="homeBtn" class="icon-btn" aria-label="홈으로">🏠</button>
    <div class="title">꼬마키즈</div>
    <div class="stars">⭐ <span id="starCount">0</span></div>
  </header>

  <!-- 메인 화면 -->
  <section id="screen-home" class="screen active">
    <h1 class="welcome">무엇을 배워볼까요?</h1>
    <div class="mode-list">
      <button class="mode-card mode-hangul" data-mode="hangul">
        <div class="mode-icon">ㄱㄴㄷ</div>
        <div class="mode-text">
          <div class="mode-label">한글 자모</div>
          <div class="mode-desc">자음·모음 24장</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-alphabet" data-mode="alphabet">
        <div class="mode-icon">ABC</div>
        <div class="mode-text">
          <div class="mode-label">영어 알파벳</div>
          <div class="mode-desc">A-Z 26장</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-complete" data-mode="complete">
        <div class="mode-icon">사?</div>
        <div class="mode-text">
          <div class="mode-label">글자 완성</div>
          <div class="mode-desc">빠진 자모 채우기</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-compose" data-mode="compose">
        <div class="mode-icon">ㄱ+ㅏ</div>
        <div class="mode-text">
          <div class="mode-label">자모 합성</div>
          <div class="mode-desc">자음·모음 조합해 글자 만들기</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-clap" data-mode="clap">
        <div class="mode-icon">👏</div>
        <div class="mode-text">
          <div class="mode-label">음절 박수</div>
          <div class="mode-desc">단어 박수 횟수 맞히기</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-balloon" data-mode="balloon">
        <div class="mode-icon">🎈</div>
        <div class="mode-text">
          <div class="mode-label">풍선 터뜨리기</div>
          <div class="mode-desc">단어 찾아 펑!</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-dashboard" data-mode="dashboard">
        <div class="mode-icon">📊</div>
        <div class="mode-text">
          <div class="mode-label">학습 현황</div>
          <div class="mode-desc">부모용 - 약점 자모 분석</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
      <button class="mode-card mode-garage" data-mode="garage">
        <div class="mode-icon">🚗</div>
        <div class="mode-text">
          <div class="mode-label">내 자동차</div>
          <div class="mode-desc">별 모아 자동차 모으기</div>
        </div>
        <div class="mode-arrow">›</div>
      </button>
    </div>
  </section>

  <!-- 카드 그리드 화면 (한글/영어 공용) -->
  <section id="screen-grid" class="screen">
    <div id="cardGrid" class="card-grid"></div>
    <!-- 단어 상세 보기 (탭한 카드) -->
    <div id="cardDetail" class="card-detail hidden">
      <div class="card-detail-inner">
        <div id="detailEmoji" class="detail-emoji">🍎</div>
        <div id="detailChar" class="detail-char">ㄱ</div>
        <div id="detailWord" class="detail-word">가방</div>
        <button id="detailSpeakBtn" class="btn-primary">🔊 다시 듣기</button>
        <button id="detailCloseBtn" class="btn-ghost">닫기</button>
      </div>
    </div>
  </section>

  <!-- 글자 완성 게임 화면 -->
  <section id="screen-complete" class="screen">
    <div class="progress-bar">
      <div id="progressDots" class="progress-dots"></div>
      <div id="progressText" class="progress-text">1 / 10</div>
    </div>
    <div id="completeEmoji" class="complete-emoji">🦁</div>
    <div id="syllableContainer" class="syllable-container"></div>
    <div class="complete-question" id="completeQuestion">빠진 모음을 골라보세요</div>
    <div id="vowelChoices" class="vowel-choices"></div>
  </section>

  <!-- 결과 화면 -->
  <section id="screen-result" class="screen">
    <div id="resultEmoji" class="result-emoji">🎉</div>
    <div id="resultTitle" class="result-title">잘했어요!</div>
    <div id="resultScore" class="result-score">8 / 10</div>
    <div id="resultMessage" class="result-message"></div>
    <div class="result-buttons">
      <button id="resultRetryBtn" class="btn-primary">한 번 더 🔄</button>
      <button id="resultHomeBtn" class="btn-ghost">홈으로</button>
    </div>
  </section>

  <!-- 부모 대시보드 화면 -->
  <section id="screen-dashboard" class="screen">
    <h1 class="welcome">📊 학습 현황</h1>
    <div class="dash-summary">
      <div class="dash-stat"><div class="dash-stat-label">총 시도</div><div id="dashTotal" class="dash-stat-value">0</div></div>
      <div class="dash-stat"><div class="dash-stat-label">정답률</div><div id="dashAccuracy" class="dash-stat-value">0%</div></div>
      <div class="dash-stat"><div class="dash-stat-label">오늘</div><div id="dashToday" class="dash-stat-value">0</div></div>
      <div class="dash-stat"><div class="dash-stat-label">⭐ 별</div><div id="dashStars" class="dash-stat-value">0</div></div>
    </div>
    <div class="dash-section">
      <h3 class="dash-h3">🎯 약점 자모 (자주 틀려요)</h3>
      <div id="dashWeakness" class="dash-list"></div>
    </div>
    <div class="dash-section">
      <h3 class="dash-h3">💪 잘하는 자모</h3>
      <div id="dashStrength" class="dash-list"></div>
    </div>
    <div class="dash-section">
      <h3 class="dash-h3">📅 최근 7일</h3>
      <div id="dashDaily" class="dash-daily"></div>
    </div>
    <button id="dashResetBtn" class="btn-ghost">통계 초기화</button>
  </section>

  <!-- 자모 합성 화면 -->
  <section id="screen-compose" class="screen">
    <div class="compose-difficulty">
      <button id="composeEasyBtn" class="diff-btn active">쉬움</button>
      <button id="composeHardBtn" class="diff-btn">어려움</button>
    </div>
    <div class="compose-result">
      <div id="composeChar" class="compose-char">?</div>
      <div id="composeHint" class="compose-hint"></div>
    </div>
    <div class="compose-pickers">
      <div class="picker-row">
        <div class="picker-col">
          <div class="picker-label">자음</div>
          <div id="consonantPicker" class="picker-grid"></div>
        </div>
        <div class="picker-col">
          <div class="picker-label">모음</div>
          <div id="vowelPicker" class="picker-grid"></div>
        </div>
      </div>
      <div class="picker-final">
        <div class="picker-label">받침 (눌러서 추가/제거)</div>
        <div id="finalPicker" class="picker-grid picker-grid-final"></div>
      </div>
    </div>
  </section>

  <!-- 음절 박수 화면 -->
  <section id="screen-clap" class="screen">
    <div class="clap-card">
      <div id="clapEmoji" class="clap-emoji">🍎</div>
      <div id="clapWord" class="clap-word">사과</div>
      <div class="clap-question">박수 몇 번?</div>
      <div id="clapButtons" class="clap-buttons"></div>
      <div id="clapFeedback" class="clap-feedback"></div>
    </div>
    <button id="nextClapBtn" class="btn-primary">다음 ▶</button>
  </section>

  <!-- 자동차 차고 화면 -->
  <section id="screen-garage" class="screen">
    <div class="garage-header">
      <div id="garageInfo" class="garage-info">⭐ 0 · 🚗 0 / 16</div>
      <div id="garageProgress" class="garage-progress">
        <div class="garage-next">
          <span id="garageNextEmoji">🚗</span>
          <span id="garageNextRemaining">5⭐</span>
        </div>
        <div class="garage-bar"><div id="garageProgressFill" class="garage-bar-fill"></div></div>
      </div>
    </div>
    <div id="garageGrid" class="garage-grid"></div>
    <div id="garageMessage" class="garage-message"></div>
  </section>

  <!-- 풍선 게임 화면 -->
  <section id="screen-balloon" class="screen">
    <div class="balloon-info">
      <div id="balloonMission" class="balloon-mission">🐶 강아지 찾아!</div>
      <div class="balloon-stats">
        <div id="balloonTimer" class="balloon-timer">⏱ 30초</div>
        <div id="balloonScore" class="balloon-score">0점</div>
      </div>
    </div>
    <div id="balloonField" class="balloon-field"></div>
  </section>

  <!-- 풍선 결과 화면 -->
  <section id="screen-balloon-result" class="screen">
    <div class="result-emoji">🎈</div>
    <div class="result-title">시간 끝!</div>
    <div id="balloonFinalScore" class="result-score">0점</div>
    <div id="balloonFinalMsg" class="result-message"></div>
    <div class="result-buttons">
      <button id="balloonRetryBtn" class="btn-primary">한 번 더 🔄</button>
      <button id="balloonGarageBtn" class="btn-ghost">차고 보기 🚗</button>
      <button id="balloonHomeBtn" class="btn-ghost">홈으로</button>
    </div>
  </section>

  <!-- 별 획득 효과 -->
  <div id="starPop" class="star-pop">⭐</div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
